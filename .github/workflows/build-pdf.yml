name: Build Resume PDF

on:
  push:
    branches: [ master, main, 'update/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-lang-english texlive-pictures texlive-fonts-extra
        sudo apt-get install -y fonts-font-awesome
        
    - name: Verify installation
      run: |
        which xelatex
        xelatex --version | head -3
        
    - name: List files
      working-directory: Software Engineer
      run: |
        echo "Files in directory:"
        ls -la
        echo ""
        echo "Class file:"
        ls -la moak-resume.cls
        echo ""
        echo "Fonts directory:"
        ls -la Fonts/
        
    - name: Compile Resume PDF
      working-directory: Software Engineer
      run: |
        echo "=== First xelatex run ==="
        xelatex -interaction=nonstopmode "Jordan Moak Resume.tex" 2>&1 | tee compile.log || true
        echo ""
        echo "=== Checking for PDF after first run ==="
        ls -la *.pdf 2>/dev/null || echo "No PDF after first run"
        echo ""
        echo "=== Second xelatex run ==="
        xelatex -interaction=nonstopmode "Jordan Moak Resume.tex" 2>&1 | tee -a compile.log || true
        echo ""
        echo "=== Final check for PDF ==="
        ls -la *.pdf 2>/dev/null || echo "No PDF found"
        
    - name: Upload compile log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: compile-log
        path: Software Engineer/compile.log
        
    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: resume-pdf
        path: Software Engineer/Jordan Moak Resume.pdf
        
    - name: Check PDF was created
      run: |
        if [ -f "Software Engineer/Jordan Moak Resume.pdf" ]; then
          echo "✓ PDF compiled successfully"
          ls -lh "Software Engineer/Jordan Moak Resume.pdf"
        else
          echo "Error: PDF was not created"
          echo "=== Compile errors ==="
          cat Software Engineer/compile.log | grep -i "error\|!" | head -30
          exit 1
        fi
