name: Build Resume PDF

on:
  push:
    branches: [ master, main, 'update/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-lang-english texlive-pictures texlive-fonts-extra
        sudo apt-get install -y fonts-liberation fonts-font-awesome
        
    - name: Verify installation
      run: |
        which xelatex
        xelatex --version | head -3
        
    - name: Compile Minimal Resume (Primary)
      working-directory: Software Engineer
      run: |
        echo "=== Compiling minimal resume ==="
        xelatex -interaction=nonstopmode -halt-on-error "Jordan Moak Resume Minimal.tex" 2>&1 | tee compile.log
        xelatex -interaction=nonstopmode -halt-on-error "Jordan Moak Resume Minimal.tex" 2>&1 | tee -a compile.log
        
        if [ -f "Jordan Moak Resume Minimal.pdf" ]; then
          mv "Jordan Moak Resume Minimal.pdf" "Jordan Moak Resume.pdf"
          echo "✓ Minimal resume compiled successfully"
        else
          echo "Error: PDF not created"
          cat compile.log
          exit 1
        fi
        
    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: resume-pdf
        path: Software Engineer/Jordan Moak Resume.pdf
        
    - name: Verify PDF
      run: |
        ls -lh "Software Engineer/Jordan Moak Resume.pdf"
