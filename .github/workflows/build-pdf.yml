name: Build Resume PDF

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Compile Resume with TeX Live
      uses: xu-cheng/latex-action@v3
      with:
        working_directory: "Software Engineer"
        root_file: "Jordan-Moak-Resume.tex"
        latexmk_use_xelatex: true
        # Create a symlink without spaces as a workaround for latex-action
        pre_compile: |
          ln -s "Jordan Moak Resume.tex" "Jordan-Moak-Resume.tex"
        # Rename output PDF back to original name with spaces
        post_compile: |
          mv "Jordan-Moak-Resume.pdf" "Jordan Moak Resume.pdf"
        
    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: resume-pdf
        path: "Software Engineer/Jordan Moak Resume.pdf"
        retention-days: 30
        
    - name: Copy PDF to repository root (on default branch push)
      if: github.event_name == 'push' && contains(fromJSON('["refs/heads/main", "refs/heads/master"]'), github.ref)
      run: |
        cp "Software Engineer/Jordan Moak Resume.pdf" "Jordan Moak Resume.pdf"
        
    - name: Commit updated PDF (on default branch push)
      if: github.event_name == 'push' && contains(fromJSON('["refs/heads/main", "refs/heads/master"]'), github.ref)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add "Jordan Moak Resume.pdf"
        git diff --staged --quiet || git commit -m "chore: update compiled resume PDF [skip ci]"
        git push

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download PDF artifact
      uses: actions/download-artifact@v4
      with:
        name: resume-pdf
        path: ./
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: Jordan Moak Resume.pdf
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
