name: Build Resume PDF

on:
  push:
    branches: [ master, main, 'update/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-lang-english
        sudo apt-get install -y fonts-font-awesome
        
    - name: Compile Resume PDF
      working-directory: Software Engineer
      run: |
        echo "Current directory: $(pwd)"
        echo "Files in directory:"
        ls -la
        echo ""
        echo "Attempting first xelatex run..."
        xelatex -interaction=nonstopmode "Jordan Moak Resume.tex" 2>&1 || echo "First run had warnings/errors (normal)"
        echo ""
        echo "Attempting second xelatex run..."
        xelatex -interaction=nonstopmode "Jordan Moak Resume.tex" 2>&1 || echo "Second run had warnings/errors"
        echo ""
        echo "Checking for PDF..."
        ls -la *.pdf 2>/dev/null || echo "No PDF found"
        
    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: resume-pdf
        path: Software Engineer/Jordan Moak Resume.pdf
        
    - name: Check PDF was created
      run: |
        if [ -f "Software Engineer/Jordan Moak Resume.pdf" ]; then
          echo "✓ PDF compiled successfully"
          ls -lh "Software Engineer/Jordan Moak Resume.pdf"
        else
          echo "Error: PDF was not created"
          exit 1
        fi
