name: Build Resume PDF

on:
  push:
    branches: [ master, main, 'update/**', 'test/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install TeX Live
      run: |
        sudo apt-get update
        # Install texlive-full which includes everything
        sudo apt-get install -y texlive-full fonts-liberation
        # This is large (~5GB) but ensures we have all packages
        
    - name: Verify installation and list fonts
      run: |
        which xelatex
        xelatex --version
        echo ""
        echo "System fonts available:"
        fc-list | head -20
        
    - name: List local files
      working-directory: Software Engineer
      run: |
        echo "Files in directory:"
        ls -la
        echo ""
        echo "Fonts directory:"
        ls -la Fonts/
        
    - name: Compile Resume (First Pass)
      working-directory: Software Engineer
      run: |
        echo "=== First xelatex run ==="
        xelatex -interaction=nonstopmode "Jordan Moak Resume.tex" 2>&1 | tee compile1.log
        echo "Exit code: $?"
        
    - name: Check PDF after first pass
      working-directory: Software Engineer
      run: |
        if [ -f "Jordan Moak Resume.pdf" ]; then
          echo "✓ PDF created after first pass"
          ls -lh "Jordan Moak Resume.pdf"
        else
          echo "✗ No PDF after first pass"
          echo "=== Errors from first run ==="
          grep -i "error\|!" compile1.log | head -30
        fi
        
    - name: Compile Resume (Second Pass)
      working-directory: Software Engineer
      run: |
        echo "=== Second xelatex run ==="
        xelatex -interaction=nonstopmode "Jordan Moak Resume.tex" 2>&1 | tee compile2.log
        
    - name: Upload all logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: compile-logs
        path: |
          Software Engineer/compile*.log
          Software Engineer/*.aux
          Software Engineer/*.log
        
    - name: Upload PDF
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: resume-pdf
        path: Software Engineer/Jordan Moak Resume.pdf
        
    - name: Verify PDF
      run: |
        if [ -f "Software Engineer/Jordan Moak Resume.pdf" ]; then
          echo "✓ PDF compiled successfully"
          ls -lh "Software Engineer/Jordan Moak Resume.pdf"
        else
          echo "Error: PDF was not created"
          exit 1
        fi
