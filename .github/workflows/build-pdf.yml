name: Build Resume PDF

on:
  push:
    branches: [ master, main, 'update/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest-full
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Compile Resume PDF
      run: |
        cd "Software Engineer"
        xelatex -interaction=nonstopmode -halt-on-error "Jordan Moak Resume.tex" || true
        # Run twice to resolve references
        xelatex -interaction=nonstopmode -halt-on-error "Jordan Moak Resume.tex"
        
    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: resume-pdf
        path: Software Engineer/Jordan Moak Resume.pdf
        
    - name: Check PDF was created
      run: |
        if [ -f "Software Engineer/Jordan Moak Resume.pdf" ]; then
          echo "✓ PDF compiled successfully"
          ls -lh "Software Engineer/Jordan Moak Resume.pdf"
        else
          echo "Warning: PDF was not created"
          # Don't fail - the artifact upload handles missing files
        fi
