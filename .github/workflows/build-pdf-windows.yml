name: Build Resume PDF - Windows (MiKTeX)

on:
  push:
    branches: [ master, main, 'update/**', 'test/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  # MiKTeX portable version to use (check https://miktex.org/download for latest)
  MIKTEX_VERSION: "25.12"
  # Installation directory for MiKTeX portable
  MIKTEX_DIR: "C:\\miktex"

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Cache MiKTeX Portable
      id: cache-miktex
      uses: actions/cache@v4
      with:
        path: ${{ env.MIKTEX_DIR }}
        key: miktex-portable-${{ env.MIKTEX_VERSION }}-${{ runner.os }}
        restore-keys: |
          miktex-portable-${{ env.MIKTEX_VERSION }}-
          miktex-portable-
          
    - name: Download MiKTeX Portable
      if: steps.cache-miktex.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Write-Host "::group::Downloading MiKTeX Portable"
        $miktexUrl = "https://miktex.org/download/ctan/systems/win32/miktex/setup/windows-x64/basic-miktex-${env:MIKTEX_VERSION}-x64.exe"
        $outputPath = "${{ runner.temp }}\\basic-miktex-x64.exe"
        
        Write-Host "Downloading MiKTeX portable from: $miktexUrl"
        try {
          Invoke-WebRequest -Uri $miktexUrl -OutFile $outputPath -MaximumRetryCount 3 -RetryIntervalSec 5
          Write-Host "Download successful: $([math]::Round((Get-Item $outputPath).Length / 1MB, 2)) MB"
        } catch {
          # Fallback to alternative URL format if primary fails
          $miktexUrl = "https://miktex.org/download/ctan/systems/win32/miktex/setup/windows-x64/basic-miktex-x64.exe"
          Write-Host "Primary URL failed, trying fallback: $miktexUrl"
          Invoke-WebRequest -Uri $miktexUrl -OutFile $outputPath
        }
        Write-Host "::endgroup::"
        
        Write-Host "::group::Extracting MiKTeX Portable"
        New-Item -ItemType Directory -Force -Path "${env:MIKTEX_DIR}" | Out-Null
        
        # Extract the self-extracting archive
        $process = Start-Process -FilePath $outputPath -ArgumentList "--target=`"${env:MIKTEX_DIR}`"", "--auto-install=yes" -Wait -PassThru
        if ($process.ExitCode -ne 0) {
          Write-Error "MiKTeX extraction failed with exit code $($process.ExitCode)"
          exit 1
        }
        Write-Host "Extraction complete to: ${env:MIKTEX_DIR}"
        Write-Host "::endgroup::"

    - name: Configure MiKTeX Environment
      shell: pwsh
      run: |
        Write-Host "::group::Configuring MiKTeX Environment"
        
        # Set up PATH
        $miktexBin = "${env:MIKTEX_DIR}\\texmfs\\install\\miktex\\bin\\x64"
        echo "$miktexBin" | Out-File -FilePath $env:GITHUB_PATH -Append
        Write-Host "Added to PATH: $miktexBin"
        
        # Verify xelatex exists
        $xelatexPath = Join-Path $miktexBin "xelatex.exe"
        if (Test-Path $xelatexPath) {
          Write-Host "✓ xelatex found at: $xelatexPath"
        } else {
          Write-Error "✗ xelatex not found at expected location!"
          Get-ChildItem -Path $miktexBin | Select-Object -First 20
          exit 1
        }
        Write-Host "::endgroup::"

    - name: Configure MiKTeX Auto-Install
      shell: pwsh
      run: |
        Write-Host "::group::Configuring MiKTeX Package Manager"
        
        $miktexBin = "${env:MIKTEX_DIR}\\texmfs\\install\\miktex\\bin\\x64"
        $env:PATH = "$miktexBin;$env:PATH"
        
        # Configure MiKTeX for unattended/CI mode
        # Set up auto-install for missing packages
        & "$miktexBin\\initexmf.exe" --set-config-value="[MPM]AutoInstall=1" --verbose
        if ($LASTEXITCODE -ne 0) {
          Write-Warning "initexmf --set-config-value returned exit code $LASTEXITCODE"
        }
        
        # Enable package installation on-the-fly
        & "$miktexBin\\initexmf.exe" --set-config-value="[Core]OnTheFlyInstall=1" --verbose
        if ($LASTEXITCODE -ne 0) {
          Write-Warning "initexmf --set-config-value for OnTheFlyInstall returned exit code $LASTEXITCODE"
        }
        
        # Update package database
        Write-Host "Updating package database..."
        & "$miktexBin\\mpm.exe" --update-db --verbose
        if ($LASTEXITCODE -ne 0) {
          Write-Warning "mpm --update-db returned exit code $LASTEXITCODE (non-fatal)"
        }
        
        Write-Host "::endgroup::"

    - name: Pre-install Required Packages
      shell: pwsh
      run: |
        Write-Host "::group::Pre-installing Required LaTeX Packages"
        
        $miktexBin = "${env:MIKTEX_DIR}\\texmfs\\install\\miktex\\bin\\x64"
        $env:PATH = "$miktexBin;$env:PATH"
        
        # List of packages needed by the resume
        $packages = @(
          "xetex"
          "fontspec"
          "unicode-math"
          "xcolor"
          "smartdiagram"
          "fontawesome5"
          "tikz"
          "pgf-pie"
          "textpos"
          "parskip"
          "hyperref"
          "afterpage"
          "pstricks"
          "metalogo"
          "geometry"
          "ifthen"
          "enumitem"
          "etoolbox"
          "pgfopts"
          "tikzfill"
        )
        
        $failedPackages = @()
        foreach ($pkg in $packages) {
          Write-Host "Installing $pkg..." -NoNewline
          & "$miktexBin\\mpm.exe" --install=$pkg --verbose 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host " ✓"
          } else {
            Write-Host " (will auto-install if needed)"
            $failedPackages += $pkg
          }
        }
        
        if ($failedPackages.Count -gt 0) {
          Write-Host ""
          Write-Host "Note: Some packages may auto-install during compilation: $($failedPackages -join ', ')"
        }
        
        # Verify xelatex is working
        Write-Host ""
        Write-Host "Verifying xelatex installation..."
        & xelatex --version | Select-Object -First 3
        
        Write-Host "::endgroup::"

    - name: Compile Resume - First Pass
      id: compile-first
      working-directory: "Software Engineer"
      shell: pwsh
      run: |
        Write-Host "::group::First XeLaTeX Compilation"
        
        $miktexBin = "${env:MIKTEX_DIR}\\texmfs\\install\\miktex\\bin\\x64"
        $env:PATH = "$miktexBin;$env:PATH"
        
        # Set environment for unattended mode
        $env:MIKTEX_ENABLE_INSTALLER = "true"
        $env:MIKTEX_MPM_AUTOINSTALL = "1"
        
        $texFile = "Jordan Moak Resume.tex"
        Write-Host "Compiling: $texFile"
        Write-Host "Working directory: $(Get-Location)"
        
        # Check if fonts directory exists
        if (Test-Path "Fonts") {
          Write-Host "✓ Fonts directory found"
          Get-ChildItem "Fonts" | ForEach-Object { Write-Host "  - $($_.Name)" }
        } else {
          Write-Warning "Fonts directory not found! Custom fonts may not load."
        }
        
        # Run xelatex with error handling
        & xelatex -interaction=nonstopmode -halt-on-error "$texFile" 2>&1 | Tee-Object -FilePath "compile-first.log"
        $exitCode = $LASTEXITCODE
        
        Write-Host ""
        if ($exitCode -eq 0) {
          Write-Host "✓ First pass completed successfully"
        } else {
          Write-Host "✗ First pass failed with exit code $exitCode"
          Write-Host ""
          Write-Host "=== Last 50 lines of log ==="
          Get-Content "compile-first.log" -Tail 50
          Write-Host ""
          Write-Host "=== Error analysis ==="
          Select-String -Path "compile-first.log" -Pattern "(Error|!|Fatal)" | Select-Object -Last 20
          exit $exitCode
        }
        
        Write-Host "::endgroup::"

    - name: Compile Resume - Second Pass
      id: compile-second
      working-directory: "Software Engineer"
      shell: pwsh
      run: |
        Write-Host "::group::Second XeLaTeX Compilation"
        
        $miktexBin = "${env:MIKTEX_DIR}\\texmfs\\install\\miktex\\bin\\x64"
        $env:PATH = "$miktexBin;$env:PATH"
        
        # Set environment for unattended mode
        $env:MIKTEX_ENABLE_INSTALLER = "true"
        $env:MIKTEX_MPM_AUTOINSTALL = "1"
        
        $texFile = "Jordan Moak Resume.tex"
        
        & xelatex -interaction=nonstopmode -halt-on-error "$texFile" 2>&1 | Tee-Object -FilePath "compile-second.log"
        $exitCode = $LASTEXITCODE
        
        Write-Host ""
        if ($exitCode -eq 0) {
          Write-Host "✓ Second pass completed successfully"
        } else {
          Write-Host "✗ Second pass failed with exit code $exitCode"
          Write-Host ""
          Write-Host "=== Last 50 lines of log ==="
          Get-Content "compile-second.log" -Tail 50
          exit $exitCode
        }
        
        Write-Host "::endgroup::"

    - name: Verify Output
      id: verify-output
      working-directory: "Software Engineer"
      shell: pwsh
      run: |
        Write-Host "::group::Verifying PDF Output"
        
        $pdfFile = "Jordan Moak Resume.pdf"
        
        if (Test-Path $pdfFile) {
          $fileSize = (Get-Item $pdfFile).Length
          $fileSizeMB = [math]::Round($fileSize / 1MB, 2)
          Write-Host "✓ PDF generated successfully: $pdfFile ($fileSizeMB MB)"
          
          # Basic PDF validation - check it starts with PDF header
          $bytes = Get-Content -Path $pdfFile -Encoding Byte -TotalCount 8
          $header = [System.Text.Encoding]::ASCII.GetString($bytes)
          if ($header.StartsWith("%PDF-")) {
            Write-Host "✓ Valid PDF header detected: $header"
          } else {
            Write-Warning "PDF header check failed. Header: $header"
          }
        } else {
          Write-Error "✗ PDF file not found: $pdfFile"
          Write-Host "Contents of current directory:"
          Get-ChildItem -File | Select-Object Name, @{N="Size(KB)";E={[math]::Round($_.Length/1KB,2)}}
          exit 1
        }
        
        Write-Host "::endgroup::"

    - name: Upload PDF Artifact
      uses: actions/upload-artifact@v4
      with:
        name: resume-pdf-windows
        path: Software Engineer/Jordan Moak Resume.pdf
        if-no-files-found: error
        retention-days: 30
        
    - name: Upload Compilation Logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: compile-logs
        path: |
          Software Engineer/*.log
          Software Engineer/*.aux
          Software Engineer/*.out
        if-no-files-found: ignore
        retention-days: 7
        
    - name: Summary
      if: always()
      shell: pwsh
      run: |
        Write-Host "::group::Build Summary"
        
        Write-Host "Job status: ${{ job.status }}"
        
        # Show cache info
        $miktexSize = if (Test-Path "${env:MIKTEX_DIR}") { 
          [math]::Round((Get-ChildItem "${env:MIKTEX_DIR}" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB, 2)
        } else { 0 }
        Write-Host "MiKTeX installation size: $miktexSize MB"
        
        # Check for PDF
        $pdfPath = "Software Engineer\\Jordan Moak Resume.pdf"
        if (Test-Path $pdfPath) {
          $pdfSize = [math]::Round((Get-Item $pdfPath).Length / 1KB, 2)
          Write-Host "PDF output: $pdfSize KB"
        }
        
        Write-Host "::endgroup::"
