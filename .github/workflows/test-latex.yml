name: Test Basic LaTeX

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-latex-extra texlive-lang-english fonts-font-awesome
        
    - name: Test basic xelatex
      run: |
        cd "Software Engineer"
        echo "Testing basic xelatex..."
        echo '\documentclass{article}\begin{document}Hello\end{document}' > test.tex
        xelatex test.tex
        ls -la test.pdf && echo "Basic test passed!"
        
    - name: List files
      run: |
        cd "Software Engineer"
        echo "Files in directory:"
        ls -la
        echo ""
        echo "Checking for moak-resume.cls:"
        ls -la moak-resume.cls || echo "Class file not found!"
        echo ""
        echo "Fonts directory:"
        ls -la Fonts/ || echo "Fonts directory not found!"
        
    - name: Try to compile resume (with full output)
      run: |
        cd "Software Engineer"
        echo "Attempting to compile resume..."
        xelatex -interaction=nonstopmode "Jordan Moak Resume.tex" 2>&1 | head -100
        echo "Exit code: $?"
